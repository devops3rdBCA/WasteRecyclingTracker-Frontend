name: Build and deploy React app to Azure Web App - frontend-rg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
         client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B1725C0EC9D441BAA457BA5DB0F0ECA9 }}
         tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A0B164FF8BA6452589C99D34E8D7B75C }}
         subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C8D140BA84584CCC95E8B75BFC23D264 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontend-rg'   # Change this only if your Azure App Service has a different name
          slot-name: 'Production'
          package: 'build'          # Deploy the build folder (correct for React)
