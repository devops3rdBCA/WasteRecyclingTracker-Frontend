name: Build and deploy React app to Azure Web App - frontend-rg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'    # Or your preferred version!

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontend-rg'   # <-- Ensure this is your Azure app name!
          slot-name: 'Production'
          package: 'build'          # <-- THIS IS THE KEY CHANGE!
